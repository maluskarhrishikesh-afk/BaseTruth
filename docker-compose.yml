# BaseTruth — Docker Compose
#
# Services:
#   basetruth-cli  — one-shot CLI runner (scan / compare-payslips)
#   basetruth-api  — FastAPI REST server (port 8000)
#
# Usage:
#   docker compose build
#   docker compose run --rm basetruth-cli scan --input /app/your_data/doc.pdf
#   docker compose up basetruth-api
#
# Environment overrides: create a `.env` file in this directory.
# Required: none. All paths default to bind-mounts below.

services:

  # ── CLI — run any basetruth command ─────────────────────────────────────────
  basetruth-cli:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: basetruth:latest
    volumes:
      # Mount your local data in; scan results come back here
      - ./artifacts:/app/artifacts
      - ./your_data:/app/your_data
    environment:
      TESSERACT_CMD: /usr/bin/tesseract
      EXIFTOOL_PATH: /usr/bin/exiftool
      BASETRUTH_ARTIFACT_ROOT: /app/artifacts
    # Override at `docker compose run` time:
    #   docker compose run --rm basetruth-cli scan --input /app/your_data/doc.pdf
    entrypoint: ["python", "-m", "basetruth.cli"]
    command: ["--help"]

  # ── UI — Streamlit operator dashboard ─────────────────────────────────────────
  basetruth-ui:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: basetruth:latest
    ports:
      - "${UI_PORT:-8501}:8501"
    volumes:
      - ./artifacts:/app/artifacts
      - ./your_data:/app/your_data
    environment:
      TESSERACT_CMD: /usr/bin/tesseract
      EXIFTOOL_PATH: /usr/bin/exiftool
      BASETRUTH_ARTIFACT_ROOT: /app/artifacts
    entrypoint:
      - python
      - -m
      - streamlit
      - run
      - src/basetruth/ui/app.py
      - --server.port=8501
      - --server.address=0.0.0.0
      - --server.headless=true
      - --browser.gatherUsageStats=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ── API — FastAPI REST server ────────────────────────────────────────────────
  basetruth-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: basetruth:latest
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./artifacts:/app/artifacts
      - ./your_data:/app/your_data
    environment:
      TESSERACT_CMD: /usr/bin/tesseract
      EXIFTOOL_PATH: /usr/bin/exiftool
      BASETRUTH_ARTIFACT_ROOT: /app/artifacts
    entrypoint: ["python", "-m", "uvicorn", "basetruth.api:app",
                 "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
